<svg xmlns="http://www.w3.org/2000/svg" width="760" height="430" viewBox="0 0 760 430" font-family="ui-monospace, 'Cascadia Code', 'Source Code Pro', Menlo, Consolas, monospace" font-size="13">
  <rect x="0" y="0" width="760" height="430" rx="10" fill="#1c1f26"/>
  <rect x="0" y="0" width="760" height="30" rx="10" fill="#2a2e38"/>
  <rect x="0" y="20" width="760" height="10" fill="#2a2e38"/>
  <circle cx="20" cy="15" r="5" fill="#ff5f57"/>
  <circle cx="38" cy="15" r="5" fill="#febc2e"/>
  <circle cx="56" cy="15" r="5" fill="#28c840"/>
  <text x="380" y="19" fill="#8b93a7" text-anchor="middle" font-size="12">ruletrace — what does this path actually get?</text>

  <text x="20" y="56" fill="#9aa2b5"><tspan fill="#28c840">$</tspan> ruletrace src/parser/lexer.ts</text>
  <text x="20" y="78" fill="#c8ceda">ruletrace 0.1.0 — effective instruction stack</text>
  <text x="20" y="96" fill="#8b93a7">target: src/parser/lexer.ts</text>

  <text x="20" y="122" fill="#61afef">claude-code — 3 layers</text>
  <text x="20" y="140" fill="#c8ceda">  1.  CLAUDE.md         <tspan fill="#8b93a7">nesting  project root memory</tspan></text>
  <text x="20" y="158" fill="#98c379">       -&gt; @docs/style.md  [ok]  docs/style.md (line 6)</text>
  <text x="20" y="176" fill="#98c379">          -&gt; @naming.md  [ok]  docs/naming.md (line 3)</text>
  <text x="20" y="194" fill="#c8ceda">  2.  CLAUDE.local.md   <tspan fill="#8b93a7">local    personal memory (not shared)</tspan></text>
  <text x="20" y="212" fill="#c8ceda">  3.  src/CLAUDE.md     <tspan fill="#8b93a7">nesting  ancestor directory src/</tspan></text>

  <text x="20" y="240" fill="#61afef">cursor — 2 layers</text>
  <text x="20" y="258" fill="#c8ceda">  1.  .cursor/rules/base.mdc        <tspan fill="#8b93a7">always  alwaysApply: true</tspan></text>
  <text x="20" y="276" fill="#c8ceda">  2.  .cursor/rules/typescript.mdc  <tspan fill="#8b93a7">auto    glob src/**/*.ts matched</tspan></text>
  <text x="20" y="294" fill="#e5c07b">  ~   .cursor/rules/reviews.mdc     <tspan fill="#8b93a7">agent-requested  model decides</tspan></text>

  <text x="20" y="322" fill="#61afef">copilot — 2 layers</text>
  <text x="20" y="340" fill="#c8ceda">  1.  .github/copilot-instructions.md              <tspan fill="#8b93a7">always</tspan></text>
  <text x="20" y="358" fill="#c8ceda">  2.  .github/instructions/parser.instructions.md  <tspan fill="#8b93a7">auto</tspan></text>

  <text x="20" y="386" fill="#61afef">agents.md — 2 layers</text>
  <text x="20" y="404" fill="#c8ceda">  1.  AGENTS.md             <tspan fill="#8b93a7">overridden where they conflict</tspan></text>
  <text x="20" y="422" fill="#c8ceda">  2.  src/parser/AGENTS.md  <tspan fill="#28c840">nearest — takes precedence</tspan></text>
</svg>
